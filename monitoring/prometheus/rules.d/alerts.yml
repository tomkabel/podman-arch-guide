# Additional Podman-Specific Alerts

groups:
  - name: podman_health
    rules:
      - alert: ContainerDown
        expr: up{job="podman-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.container_name }} is down"
          
      - alert: ContainerRestartLoop
        expr: rate(container_restarts_total[10m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container_name }} is restarting frequently"
          
      - alert: ImagePullFailure
        expr: increase(image_pull_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Failed to pull container image"
          
      - alert: StorageNearFull
        expr: (
          container_fs_usage_bytes / container_fs_limit_bytes
        ) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container storage is near full"
          
      - alert: OOMKills
        expr: increase(container_oom_events_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.container_name }} was OOM killed"
          action: "Increase memory limit or optimize application"
