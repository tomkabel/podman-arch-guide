# HAProxy Configuration for Blue-Green Deployment
# Routes traffic between blue and green environments

global
    log stdout local0 info
    maxconn 4096
    user haproxy
    group haproxy
    daemon

    # Performance tuning
    nbthread 4
    cpu-map auto:1/1-4 0-3

    # SSL/TLS settings
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option log-health-checks

    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s
    timeout http-keep-alive 10s

    # Error pages
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http

    # Stats
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

# Frontend - Main entry point
frontend http_frontend
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/combined.pem alpn h2,http/1.1

    # Security headers
    http-response set-header X-Frame-Options SAMEORIGIN
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy strict-origin-when-cross-origin

    # Health check endpoint
    acl is_health_check path /health
    use_backend health_backend if is_health_check

    # Blue-Green routing based on cookie or header
    acl cookie_blue req.cook(DEPLOYMENT_COLOR) blue
    acl cookie_green req.cook(DEPLOYMENT_COLOR) green
    acl header_blue req.hdr(X-Deployment-Color) blue
    acl header_green req.hdr(X-Deployment-Color) green

    # Route to specific color if requested
    use_backend blue_backend if cookie_blue OR header_blue
    use_backend green_backend if cookie_green OR header_green

    # Default routing based on ACTIVE_COLOR environment
    # This is dynamically updated by the switch script
    default_backend %%ACTIVE_COLOR%%_backend

    # Enable compression
    compression algo gzip
    compression type text/html text/css text/javascript application/javascript

# Blue Backend
backend blue_backend
    balance roundrobin
    option httpchk GET /health?color=blue
    http-check expect status 200

    server app-blue app-blue:8080 check inter 5s rise 2 fall 3 maxconn 100

    # Stickiness (optional)
    cookie DEPLOYMENT_COLOR insert indirect nocache httponly secure

# Green Backend
backend green_backend
    balance roundrobin
    option httpchk GET /health?color=green
    http-check expect status 200

    server app-green app-green:8080 check inter 5s rise 2 fall 3 maxconn 100

    # Stickiness (optional)
    cookie DEPLOYMENT_COLOR insert indirect nocache httponly secure

# Health Check Aggregator Backend
backend health_backend
    mode http
    http-request return status 200 content-type "application/json" lf-string \
        '{"status":"healthy","timestamp":"%Tl","active_color":"%%ACTIVE_COLOR%%"}'

# Stats Frontend
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
    stats show-desc "Blue-Green Deployment Stats"
    stats show-legends
