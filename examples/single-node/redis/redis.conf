# Redis Configuration File
# Production-ready settings for Redis 7.x

# ============================================
# Network Configuration
# ============================================
# Bind to all interfaces (container networking)
bind 0.0.0.0

# Port configuration
port 6379

# TCP listen() backlog
tcp-backlog 511

# Timeout for idle connections
timeout 300

# TCP keepalive
tcp-keepalive 300

# ============================================
# Security
# ============================================
# Require password authentication
requirepass ${REDIS_PASSWORD}

# Rename dangerous commands (optional)
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG "CONFIG_a1b2c3d4"
# rename-command DEBUG ""
# rename-command SHUTDOWN "SHUTDOWN_a1b2c3d4"

# ============================================
# Persistence (RDB)
# ============================================
# Enable RDB snapshots
save 900 1
save 300 10
save 60 10000

# Stop writes if RDB fails
stop-writes-on-bgsave-error yes

# Compress RDB files
rdbcompression yes

# Checksum RDB files
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Data directory
dir /data

# ============================================
# Persistence (AOF)
# ============================================
# Enable AOF persistence
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# fsync policy (everysec = good balance)
appendfsync everysec

# Don't fsync during rewrite
no-appendfsync-on-rewrite no

# Auto-rewrite AOF
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Load truncated AOF
aof-load-truncated yes

# Use RDB preamble in AOF
aof-use-rdb-preamble yes

# ============================================
# Memory Management
# ============================================
# Max memory limit (adjust based on container limits)
maxmemory 400mb

# Eviction policy
maxmemory-policy allkeys-lru

# Max memory samples
maxmemory-samples 5

# ============================================
# Performance Tuning
# ============================================
# I/O threads (Redis 6+)
io-threads 2

# Don't use I/O threads for reads (safe default)
io-threads-do-reads no

# Slow log threshold (microseconds)
slowlog-log-slower-than 10000

# Slow log max length
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100

# ============================================
# Logging
# ============================================
# Log level (debug, verbose, notice, warning)
loglevel notice

# Log file (stdout for container logging)
logfile ""

# ============================================
# Client Output Buffer Limits
# ============================================
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ============================================
# Kernel Tuning Hints
# ============================================
# These require sysctl settings on the host:
# net.core.somaxconn = 65535
# vm.overcommit_memory = 1
# transparent_hugepage = never
